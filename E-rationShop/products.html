<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ration Products | E-Ration Shop</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="responsive.css">
</head>

<body>

  <nav class="navbar navbar-expand-lg rs-navbar sticky-top">
    <div class="container">
      <a class="navbar-brand" href="index.html"><span class="brand-mark">🌾</span> E-Ration Shop</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu"
        aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-1">
          <li class="nav-item"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
          <li class="nav-item"><a class="nav-link active" href="products.html">Products</a></li>
          <li class="nav-item position-relative">
            <a class="nav-link" href="cart.html">Cart
              <span class="badge rounded-pill bg-warning text-dark js-cart-count"
                style="display:none;position:absolute;top:2px;right:-4px;font-size:.65rem;">0</span>
            </a>
          </li>
          <li class="nav-item"><a class="nav-link" href="complaint.html">Complaint</a></li>
          <li class="nav-item ms-lg-2"><a class="btn-nav-outline js-logout" href="#">Logout</a></li>
          <li class="nav-item ms-lg-2 mt-2 mt-lg-0"><button class="dark-toggle" title="Toggle dark mode">🌙</button>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <header class="rs-hero" style="padding:2.6rem 0;">
    <div class="container">
      <span class="eyebrow">This Month's Entitlement</span>
      <h1 class="mt-1 mb-0" style="font-size:2rem;">Ration Products</h1>
    </div>
  </header>

  <section class="section">
    <div class="container">

      <div class="row g-3 mb-4">
        <div class="col-md-8">
          <input type="text" id="productSearch" class="form-control"
            placeholder="🔍 Search products (e.g. rice, oil...)">
        </div>
        <div class="col-md-4">
          <select id="categoryFilter" class="form-select">
            <option value="all">All Categories</option>
            <option value="grains">Grains</option>
            <option value="essentials">Essentials</option>
            <option value="fuel">Fuel</option>
          </select>
        </div>
      </div>

      <div class="row g-4" id="productGrid">
        <!-- Products injected by js/products.js -->
      </div>

    </div>
  </section>

  <footer class="rs-footer">
    <div class="container">
      <div class="foot-line text-center" style="margin-top:0;border-top:none;padding-top:0;">
        &copy; <span class="js-year"></span> E-Ration Shop — Department of Food, Civil Supplies &amp; Consumer Affairs.
        All rights reserved.
      </div>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="app.js"></script>
  <script src="products.js"></script>
</body>

</html>
