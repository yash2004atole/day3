<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .img1 {
            width: 200px;
            height: 200px;
            animation: yash 3s ease-in-out 5s infinite;
            margin: 40px;
            margin-top: 20px;
        }
        .img2{
            width:200px;
            height: 200px;
            animation: raj 3s ease-in 5ms infinite;
            transition: cubic-bezier(0.075, 0.82, 0.165, 1);
            align-items: center;
            margin-left:5px ;
            padding-right: 8px;
        }
        .img3{
            width: 200px;
            height: 200px;
            animation: durgesh 2s ease-out 2s infinite;
            margin-inline-start: 20px;
            margin-inline-end: 10px;
        }
        .img4{
            width: 200px;
            height: 200px;
            animation: ganesh 3ms ease-in-out 5ms infinite;
            
        }
        @keyframes yash {
            0% {
                border-radius: 10px;
                transition: all;
                transform: rotate(45deg);
                margin: 0 3px;
                padding-bottom: 10px;
                float: inline-start;
                opacity: 0.4;
            }
            10% {
                border-radius: 80px;
                transform: rotate(80deg);
                kerning: 20px;
                margin-top: 1.5px;
                padding-top: 15px;
                float: bottom;
                transform: scale(1.5);
            }

            20% {
                border-radius: 100px;
                transform: rotate(120deg);
                transition: cubic-bezier(0.19, 1, 0.22, 1);
                margin-left: 18px;
                padding-right: 22px;
                float: left;
                transform: scale(0.5);
            }
        }
        @keyframes raj{
            0%{
                border-radius: 100px;
                transform: rotate(20deg);
                padding-bottom: 9px;
                display: flex;
                flex-direction: center;
                opacity: 1.4px;
                float: left;
            }
            10%{
                border-radius: 50px;
                transform:rotate(30deg) ;
                align-items: center;
                direction: rtl;
                padding-top: 15px;
                float: right;
            }
            20%{
                border-radius: 20px;
                text-shadow: 10px;
                align-items: center;
                direction: ltr;
                padding-bottom: 0 12px;
                float:inline-end;
            }
            30%{
                background-origin: padding-box;
                display: flex;
                align-items: self-start;
                text-shadow: 20px;
                justify-content: center;
            }
        }
            @keyframes durgesh{
            0%{
                border-radius: 100px;
                transform: rotate(20deg);
                padding-bottom: 9px;
                display: flex;
                flex-direction: center;
                opacity: 1.4px;
                float: left;
            }
            10%{
                border-radius: 50px;
                transform:rotate(30deg) ;
                align-items: center;
                direction: rtl;
                padding-top: 15px;
                float: right;
            }
            20%{
                border-radius: 20px;
                text-shadow: 10px;
                align-items: center;
                direction: ltr;
                padding-bottom: 0 12px;
                float:inline-end;
            }
            30%{
                background-origin: padding-box;
                display: flex;
                align-items: self-start;
                text-shadow: 20px;
               
            }
        }
         @keyframes ganesh{
            0%{
                border-radius: 100px;
                transform: rotate(20deg);
                padding-bottom: 9px;
                display: flex;
                flex-direction: center;
                opacity: 1.4px;
                float: left;
            }
            10%{
                border-radius: 50px;
                transform:rotate(30deg) ;
                align-items: center;
                padding-top: 15px;
                float: right;
            }
            20%{
                border-radius: 20px;
                text-shadow: 10px;
                align-items: center;
                padding-bottom: 0 12px;
                float:inline-end;
            }
            30%{
                background-origin: padding-box;
                display: flex;
                align-items: self-start;
                text-shadow: 20px;
            }
        }
    </style>
</head>

<body>
 <img class="img1" src="moneyHighest.jpg" alt="">
<img class="img2" src="simpleImage.jpg" alt="">
<img class="img3" src="Bappa.jpg" alt="">
<img class="img4" src="colon1.jpg" alt="">
</body>

</html>
