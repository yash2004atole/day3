<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flipkart Navbar Clone</title>
<link rel="stylesheet" href="npm i bootstrap-icons">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

.navbar{
    background:#2874f0;
    height:60px;
    display:flex;
    align-items:center;
    justify-content:space-around;
    padding:0 20px;
}
.search{
    width:40%;
    display:flex;
}

.search input{
    width:100%;
    padding:10px;
    border:none;
    /* outline:none; */
    border-radius:2px 0 0 2px;
}

.search button{
    padding:10px 15px;
    border:none;
    background:white;
    color:black;
    cursor:pointer;
    border-radius:0 2px 2px 0;
}

.nav-links{
    display:flex;
    gap:25px;
    align-items:center;
}

.nav-links a{
    color:white;
    text-decoration:none;
    font-weight:500;
}
.login-btn{
    background:white;
    color:#2874f0 !important;
    padding:8px 25px;
    border-radius:2px;
    font-weight:bold;
}
</style>
</head>
<body>
<nav class="navbar">
    <div class="logo">
        <a href="" class="btn btn-warning"><img src="https://rukminim2.flixcart.com/fk-p-flap/46/18/image/31f7e3af490c225f.png?q=80" alt="" style="height: 30px; width:80px; color: rgb(255, 255, 2);"></a>
    </div>

    <div class="search">
        <input type="text" placeholder="Search for products, brands and more">
        <button><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-search-heart" viewBox="0 0 16 16">
  <path d="M6.5 4.482c1.664-1.673 5.825 1.254 0 5.018-5.825-3.764-1.664-6.69 0-5.018"/>
  <path d="M13 6.5a6.47 6.47 0 0 1-1.258 3.844q.06.044.115.098l3.85 3.85a1 1 0 0 1-1.414 1.415l-3.85-3.85a1 1 0 0 1-.1-.115h.002A6.5 6.5 0 1 1 13 6.5M6.5 12a5.5 5.5 0 1 0 0-11 5.5 5.5 0 0 0 0 11"/>
</svg></button>
    </div>

    <div class="nav-links">
        <a href=""><button class="btn btn-success">Login</button></a>
        <a href="#">Order</a>
        <a href="#">
           <select name="" id="">
            <option value="">More</option>
            <option value="">Color</option>
            <option value="">View</option>
           </select> 
        </a>
        <a href="#">🛒Cart</a>
    </div>
</nav>

</body>
</html>
