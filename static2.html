<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blast TV Navbar</title>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
        crossorigin="anonymous"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000;
            font-family: Arial, sans-serif;
        }

        nav {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 40px;
            background-color: black;
            position: fixed;
            top: 0;
            left: 0;
        }

        .div-left {
            display: flex;
            align-items: center;
            gap: 25px;
        }

        .div-left img {
            width: 120px;
            height: 40px;
            /* transform: scale(80deg); */
        }

        .div-left a {
            color: white;
            text-decoration: none;
            font-size: 17px;
            transition: 0.3s;
        }

        .div-right a:hover {
            color: orange;
        }


        .div-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .div-right i {
            color: white;
            font-size: 22px;
        }

        .search-icon {
            color: white;
            font-size: 22px;
            cursor: pointer;
        }

        .search-icon:hover {
            color: orange;
        }

        select {
            width: 100px;
            height: 30px;
            border-radius: 4px;
            border: none;
            padding: 5px;
        }

        button {
            padding: 8px 18px;
            border: none;
            border-radius: 5px;
            background-color: orange;
            color: white;
            cursor: pointer;
            font-size: 15px;
        }

        button:hover {
            background-color: rgb(rgb(31, 45, 42));
        }

        .div-center {
            color: white;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            font-family: 'Times New Roman', Times, serif;
            background-color: rgb(0, 0, 0);
        }

        .footer {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: #fff;
            padding: 60px 10% 20px;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 40px;
            margin-bottom: 40px;
            
        }

        .col h3 {
            margin-bottom: 20px;
            font-size: 22px;
            position: relative;
        }

        .col h3::after {
            content: '';
            position: absolute;
            left: 0;
            bottom: -8px;
            width: 50px;
            height: 3px;
            background: #38bdf8;
            border-radius: 10px;
        }

        .col p {
            color: #cbd5e1;
            line-height: 1.8;
        }

        .links {
            list-style: none;
        }

        .links li {
            margin: 12px 0;
        }

        .links a {
            text-decoration: none;
            color: #cbd5e1;
            transition: 0.3s;
        }

        .links a:hover {
            color: #38bdf8;
            padding-left: 5px;
        }

        .icons {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }

        .icons a {
            width: 42px;
            height: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 50%;
            color: white;
            text-decoration: none;
            transition: 0.3s;
        }

        .icons a:hover {
            background: #38bdf8;
            transform: translateY(-5px);
        }

        .letter {
            margin-top: 15px;
        }

        .letter input {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            margin-bottom: 10px;
            outline: none;
        }

        .letter button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #38bdf8;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .letter button:hover {
            background: #0ea5e9;
        }

        .footer-bottom {
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 20px;
            text-align: center;
            color: #94a3b8;
            font-size: 14px;
        }

        .footer-bottom a {
            color: #38bdf8;
            text-decoration: none;
        }
        
    </style>
</head>

<body>

 <header>
       
        <div class="msg">
             <h3 class="cls">Blast movie</h3>
            Your search any type of movie on this side...

        </div>
    </header>
    <nav>
 
        <div class="div-left">

            <img src="https://content-images.onvesper.com/prod/AUTOx600-webp/dce.tapgo/settings/General_-_Logo.x78Fj.png?ts=1736174464"
                alt="logo">

            <a href="./staticHome.html">Home</a>
            <a href="#">Stores</a>
            <a href="#">Guide</a>
            <select>
                <option>More</option>
                <option>Watching</option>
                <option>History</option>
                <option>Favorites</option>
            </select>
        </div>
        <div class="div-right">
            <a href=""><i class="fa-sharp fa-light fa-magnifying-glass"></i></a>
            <a href="/SIGNIN.html"><button>SIGN IN</button></a>
            <a href=""><button>SIGN UP</button></a>
        </div>
    </nav>

    <div class="div-center">
        <h1 style="font-size: 50px; font-style: italic;font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;">
            <b>Welcome</b>
        </h1>
        <div>
            <p>Great welcome on this site. An available any type of movie...</p>
        </div>
    </div>
    <footer>
        <div class="footer-bottom">
            © 2026 Your Brand. All Rights Reserved. |
            Designed with ❤ by <a href="#">Your Company</a>
        </div>
    </footer>

</body>

</html>
